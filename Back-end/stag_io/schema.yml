openapi: 3.0.3
info:
  title: ''
  version: 0.0.0
paths:
  /api/administration/internships/:
    get:
      operationId: administration_internships_list
      description: List all internships for admin's university.
      tags:
      - Administration
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminInternship'
          description: ''
  /api/administration/internships/{id}/:
    get:
      operationId: administration_internships_retrieve
      description: Retrieve a single internship detail.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Administration
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminInternshipDetail'
          description: ''
  /api/administration/internships/{id}/agreement/:
    get:
      operationId: administration_internships_agreement_retrieve
      description: Download the generated internship agreement PDF.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Administration
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: string
                format: binary
          description: ''
        '404':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/administration/internships/{id}/reject/:
    patch:
      operationId: administration_internships_reject_partial_update
      description: Reject an internship (set status to 'rejected').
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Administration
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminInternship'
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/administration/internships/{id}/validate/:
    patch:
      operationId: administration_internships_validate_partial_update
      description: Validate an internship (set status to 'validated').
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Administration
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminInternship'
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/administration/notifications/:
    get:
      operationId: administration_notifications_list
      description: List all notifications for the authenticated admin.
      tags:
      - Administration - Notifications
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Notification'
          description: ''
  /api/administration/notifications/{id}/read/:
    patch:
      operationId: administration_notifications_read_partial_update
      description: Mark a single notification as read.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Administration - Notifications
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Notification'
          description: ''
        '404':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/administration/notifications/unread/:
    get:
      operationId: administration_notifications_unread_list
      description: List unread notifications for the authenticated admin.
      tags:
      - Administration - Notifications
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Notification'
          description: ''
  /api/administration/statistics/:
    get:
      operationId: administration_statistics_retrieve
      description: Main dashboard summary for admin's university.
      tags:
      - Administration - Statistics
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/administration/statistics/agreements/:
    get:
      operationId: administration_statistics_agreements_retrieve
      description: Agreement generation coverage for university internships.
      tags:
      - Administration - Statistics
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/administration/statistics/companies/:
    get:
      operationId: administration_statistics_companies_retrieve
      description: Company-level internship outcomes for admin's university.
      tags:
      - Administration - Statistics
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/administration/statistics/companies/{company_id}/:
    get:
      operationId: administration_statistics_companies_retrieve_2
      description: Detailed analytics for one company within admin's university scope.
      parameters:
      - in: path
        name: company_id
        schema:
          type: integer
        required: true
      tags:
      - Administration - Statistics
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/administration/statistics/statuses/:
    get:
      operationId: administration_statistics_statuses_retrieve
      description: Focused internship status analytics for the university.
      tags:
      - Administration - Statistics
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/administration/statistics/students/:
    get:
      operationId: administration_statistics_students_retrieve
      description: Student participation metrics for the admin's university.
      tags:
      - Administration - Statistics
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/administration/statistics/trends/:
    get:
      operationId: administration_statistics_trends_retrieve
      description: Monthly or weekly internship trend aggregation.
      tags:
      - Administration - Statistics
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/administration/statistics/wilayas/:
    get:
      operationId: administration_statistics_wilayas_retrieve
      description: Geographic distribution grouped by student or company wilaya.
      tags:
      - Administration - Statistics
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/company/applications/:
    get:
      operationId: company_applications_list
      description: |-
        GET /api/company/applications/
        List all students who applied to any of this company's offers.
      tags:
      - Company Applicants
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Applicant'
          description: ''
  /api/company/applications/{id}/accept/:
    post:
      operationId: company_applications_accept_create
      description: |-
        POST /api/company/applications/<id>/accept/
        Company accepts a student. Notifies student and all university admins.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Company Applicants
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/company/applications/{id}/reject/:
    post:
      operationId: company_applications_reject_create
      description: |-
        POST /api/company/applications/<id>/reject/
        Company rejects a student's application. Notifies the student.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Company Applicants
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/company/offers/:
    get:
      operationId: company_offers_list
      description: |-
        GET  /api/company/offers/ — list this company's offers
        POST /api/company/offers/ — create a new offer
      tags:
      - Company Offers
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InternshipOffer'
          description: ''
    post:
      operationId: company_offers_create
      description: |-
        GET  /api/company/offers/ — list this company's offers
        POST /api/company/offers/ — create a new offer
      tags:
      - Company Offers
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateInternshipOfferRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CreateInternshipOfferRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInternshipOfferRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternshipOffer'
          description: ''
  /api/company/offers/{id}/:
    get:
      operationId: company_offers_retrieve
      description: |-
        GET    /api/company/offers/<id>/ — view a specific offer
        PATCH  /api/company/offers/<id>/ — modify an offer
        DELETE /api/company/offers/<id>/ — delete an offer
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Company Offers
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternshipOffer'
          description: ''
    patch:
      operationId: company_offers_partial_update
      description: |-
        GET    /api/company/offers/<id>/ — view a specific offer
        PATCH  /api/company/offers/<id>/ — modify an offer
        DELETE /api/company/offers/<id>/ — delete an offer
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Company Offers
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUpdateInternshipOfferRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUpdateInternshipOfferRequest'
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUpdateInternshipOfferRequest'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternshipOffer'
          description: ''
    delete:
      operationId: company_offers_destroy
      description: |-
        GET    /api/company/offers/<id>/ — view a specific offer
        PATCH  /api/company/offers/<id>/ — modify an offer
        DELETE /api/company/offers/<id>/ — delete an offer
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Company Offers
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/company/offers/{id}/applicants/:
    get:
      operationId: company_offers_applicants_list
      description: |-
        GET /api/company/offers/<id>/applicants/
        List all students who applied to one of this company's offers.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Company Applicants
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Applicant'
          description: ''
  /api/notifications/:
    get:
      operationId: notifications_list
      description: |-
        GET /api/notifications/
        Returns all notifications for the logged-in user (any role).
      tags:
      - Notifications
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Notification'
          description: ''
  /api/notifications/{id}/read/:
    patch:
      operationId: notifications_read_partial_update
      description: |-
        PATCH /api/notifications/<id>/read/
        Mark a single notification as read.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Notifications
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Notification'
          description: ''
        '404':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/notifications/read-all/:
    patch:
      operationId: notifications_read_all_partial_update
      description: |-
        PATCH /api/notifications/read-all/
        Mark ALL notifications as read in one call.
        Useful for a 'Mark all as read' button in the UI.
      tags:
      - Notifications
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/notifications/unread/:
    get:
      operationId: notifications_unread_list
      description: |-
        GET /api/notifications/unread/
        Returns only unread notifications for the logged-in user.
      tags:
      - Notifications
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Notification'
          description: ''
  /api/schema/:
    get:
      operationId: schema_retrieve
      description: |-
        OpenApi3 schema for this API. Format can be selected via content negotiation.

        - YAML: application/vnd.oai.openapi
        - JSON: application/vnd.oai.openapi+json
