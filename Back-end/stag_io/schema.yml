          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
components:
  schemas:
    AddStudentSkillRequest:
      type: object
      description: Validates incoming skill_id when adding a chip.
      properties:
        skill_id:
          type: integer
      required:
      - skill_id
    AdminInternship:
      type: object
      description: Read-only serializer for admin to review internships.
      properties:
        id:
          type: integer
          readOnly: true
        student:
          type: integer
        student_name:
          type: string
          readOnly: true
        student_email:
          type: string
          format: email
          readOnly: true
        company:
          type: integer
        company_name:
          type: string
          readOnly: true
        company_email:
          type: string
          format: email
          readOnly: true
        subject:
          type: string
          maxLength: 255
        description:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        status:
          $ref: '#/components/schemas/StatusEd1Enum'
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - company
      - company_email
      - company_name
      - created_at
      - end_date
      - id
      - start_date
      - student
      - student_email
      - student_name
      - subject
      - updated_at
    AdminInternshipDetail:
      type: object
      description: Detailed internship serializer with agreement metadata.
      properties:
        id:
          type: integer
          readOnly: true
        student:
          type: integer
        student_name:
          type: string
          readOnly: true
        student_email:
          type: string
          format: email
          readOnly: true
        company:
          type: integer
        company_name:
          type: string
          readOnly: true
        company_email:
          type: string
          format: email
          readOnly: true
        subject:
          type: string
          maxLength: 255
        description:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        status:
          $ref: '#/components/schemas/StatusEd1Enum'
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        agreement:
          allOf:
          - $ref: '#/components/schemas/InternshipAgreement'
          readOnly: true
      required:
      - agreement
      - company
      - company_email
      - company_name
      - created_at
      - end_date
      - id
      - start_date
      - student
      - student_email
      - student_name
      - subject
      - updated_at
    Applicant:
      type: object
      description: |-
        One applicant row shown in the company's applicants dashboard.
        Combines the application status with the student's profile.
      properties:
        id:
          type: integer
          readOnly: true
        offer_title:
          type: string
          readOnly: true
        student:
          allOf:
          - $ref: '#/components/schemas/StudentProfile'
          readOnly: true
        status:
          $ref: '#/components/schemas/StatusEd1Enum'
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - offer_title
      - student
      - updated_at
    ApplicationDetail:
      type: object
      description: |-
        Full application detail — shown when student clicks one application.
        Includes offer info, status, and agreement download availability.
      properties:
        id:
          type: integer
          readOnly: true
        offer_title:
          type: string
          readOnly: true
        offer_description:
          type: string
          readOnly: true
        subject:
          type: string
          maxLength: 255
        description:
          type: string
        company_name:
          type: string
          readOnly: true
        company_logo:
          type: string
          format: uri
          readOnly: true
        wilaya:
          type: string
          readOnly: true
        offer_type:
          type: string
          readOnly: true
        salary_per_week:
          type: string
          format: decimal
          pattern: ^\d{0,8}(\.\d{0,2})?$
          readOnly: true
        start_date:
          type: string
          format: date
          readOnly: true
        end_date:
          type: string
          format: date
          readOnly: true
        duration_display:
          type: string
          readOnly: true
        required_skills:
          type: string
          readOnly: true
        status:
          $ref: '#/components/schemas/StatusEd1Enum'
        agreement_available:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - agreement_available
      - company_logo
      - company_name
      - created_at
      - duration_display
      - end_date
      - id
      - offer_description
      - offer_title
      - offer_type
      - required_skills
      - salary_per_week
      - start_date
      - subject
      - updated_at
      - wilaya
    ApplicationList:
      type: object
      description: Compact application card shown in 'My Applications' list.
      properties:
        id:
          type: integer
          readOnly: true
        offer_title:
          type: string
          readOnly: true
        company_name:
          type: string
          readOnly: true
        company_logo:
          type: string
          format: uri
          readOnly: true
        wilaya:
          type: string
          readOnly: true
        offer_type:
          type: string
          readOnly: true
        status:
          $ref: '#/components/schemas/StatusEd1Enum'
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - company_logo
      - company_name
      - created_at
      - id
      - offer_title
      - offer_type
      - wilaya
    BlankEnum:
      enum:
      - ''
    CompanyRegister:
      type: object
      description: Serializer for registering a new company.
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        name:
          type: string
          maxLength: 255
        description:
          type: string
        wilaya:
          $ref: '#/components/schemas/WilayaEnum'
        website:
          type: string
          format: uri
          maxLength: 255
      required:
      - email
      - name
      - wilaya
    CompanyRegisterRequest:
      type: object
      description: Serializer for registering a new company.
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          writeOnly: true
          minLength: 5
        name:
          type: string
          maxLength: 255
        description:
          type: string
        wilaya:
          $ref: '#/components/schemas/WilayaEnum'
        website:
          type: string
          format: uri
          maxLength: 255
      required:
      - email
      - name
      - password
      - wilaya
    CompanyUpdate:
      type: object
      description: Serializer for updating company profile fields.
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
        name:
          type: string
          maxLength: 255
        description:
          type: string
        wilaya:
          $ref: '#/components/schemas/WilayaEnum'
        website:
          type: string
          format: uri
          maxLength: 255
      required:
      - email
      - id
    CreateInternshipOfferRequest:
      type: object
      description: |-
        Used for POST /api/company/offers/ (create).
        skill_ids is a list of skill IDs the company selects as required.
        Example: { "skill_ids": [1, 3, 7] }
      properties:
        title:
          type: string
          maxLength: 255
        description:
          type: string
        location:
          type: string
          maxLength: 255
        wilaya:
          oneOf:
          - $ref: '#/components/schemas/WilayaEnum'
          - $ref: '#/components/schemas/BlankEnum'
        type:
          $ref: '#/components/schemas/TypeEnum'
        salary_per_week:
          type: string
          format: decimal
          pattern: ^\d{0,8}(\.\d{0,2})?$
          nullable: true
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        photo:
          type: string
          format: binary
          nullable: true
        status:
          $ref: '#/components/schemas/StatusA6fEnum'
        skill_ids:
          type: array
          items:
            type: integer
          writeOnly: true
          description: List of skill IDs required for this offer.
      required:
      - description
      - end_date
      - location
      - start_date
      - title
      - type
    InternshipAgreement:
      type: object
      description: Read-only serializer for internship agreement metadata.
      properties:
        id:
          type: integer
          readOnly: true
        pdf_url:
          type: string
          format: uri
          readOnly: true
        generated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - generated_at
      - id
      - pdf_url
    InternshipOffer:
      type: object
      description: |-
        Used for GET requests (list and detail).
        Shows all fields including computed duration and required skills.
      properties:
        id:
          type: integer
          readOnly: true
        company:
          type: integer
          readOnly: true
        company_name:
          type: string
          readOnly: true
        title:
          type: string
          maxLength: 255
        description:
          type: string
        location:
          type: string
          maxLength: 255
        wilaya:
          oneOf:
          - $ref: '#/components/schemas/WilayaEnum'
          - $ref: '#/components/schemas/BlankEnum'
        type:
          $ref: '#/components/schemas/TypeEnum'
        salary_per_week:
          type: string
          format: decimal
          pattern: ^\d{0,8}(\.\d{0,2})?$
          nullable: true
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        duration_display:
          type: string
          readOnly: true
        required_skills:
          type: string
          readOnly: true
        photo:
          type: string
          format: uri
          nullable: true
        status:
          $ref: '#/components/schemas/StatusA6fEnum'
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - company
      - company_name
      - created_at
      - description
      - duration_display
      - end_date
      - id
      - location
      - required_skills
      - start_date
      - title
      - updated_at
    LogoImage:
      type: object
      description: Serializer for uploading images to logos.
      properties:
        id:
          type: integer
          readOnly: true
        logo:
          type: string
          format: uri
          nullable: true
      required:
      - id
      - logo
    Notification:
      type: object
      description: Universal notification serializer for all actors.
      properties:
        id:
          type: integer
          readOnly: true
        internship_id:
          type: integer
          readOnly: true
        notification_type:
          allOf:
          - $ref: '#/components/schemas/NotificationTypeEnum'
          readOnly: true
        message:
          type: string
          readOnly: true
        link:
          type: string
          readOnly: true
        student_name:
          type: string
          readOnly: true
        company_name:
          type: string
          readOnly: true
        internship_subject:
          type: string
          readOnly: true
        internship_status:
          type: string
          readOnly: true
        is_read:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - company_name
      - created_at
      - id
      - internship_id
      - internship_status
      - internship_subject
      - link
      - message
      - notification_type
      - student_name
    NotificationTypeEnum:
      enum:
      - application_submitted
      - application_accepted
      - application_rejected
      - internship_validated
      - new_applicant
      - agreement_ready
      - admin_rejected
      - internship_accepted
      type: string
    PatchedCompanyUpdateRequest:
      type: object
      description: Serializer for updating company profile fields.
      properties:
        name:
          type: string
          maxLength: 255
        description:
          type: string
        wilaya:
          $ref: '#/components/schemas/WilayaEnum'
        website:
          type: string
          format: uri
          maxLength: 255
    PatchedLogoImageRequest:
      type: object
      description: Serializer for uploading images to logos.
      properties:
        logo:
          type: string
          format: binary
          nullable: true
    PatchedProfileImageRequest:
      type: object
      description: Serializer for uploading student profile images.
      properties:
        profile_image:
          type: string
          format: binary
          nullable: true
    PatchedStudentUpdateRequest:
      type: object
      description: Serializer for updating student profile fields.
      properties:
        full_name:
          type: string
          maxLength: 255
        wilaya:
          $ref: '#/components/schemas/WilayaEnum'
        github_link:
          type: string
          format: uri
          maxLength: 255
        portfolio_link:
          type: string
          format: uri
          maxLength: 255
    PatchedUpdateInternshipOfferRequest:
      type: object
      description: |-
        Used for PATCH /api/company/offers/<id>/ (partial update).
        Every field is optional. skill_ids replaces ALL current skills.
        Send [] to remove all skills, omit to keep existing ones unchanged.
      properties:
        title:
          type: string
          maxLength: 255
        description:
          type: string
        location:
          type: string
          maxLength: 255
        wilaya:
          oneOf:
          - $ref: '#/components/schemas/WilayaEnum'
          - $ref: '#/components/schemas/BlankEnum'
        type:
          $ref: '#/components/schemas/TypeEnum'
        salary_per_week:
          type: string
          format: decimal
          pattern: ^\d{0,8}(\.\d{0,2})?$
          nullable: true
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        photo:
          type: string
          format: binary
          nullable: true
        status:
          $ref: '#/components/schemas/StatusA6fEnum'
        skill_ids:
          type: array
          items:
            type: integer
          writeOnly: true
          description: Replaces all required skills. Send [] to clear all.
