  /api/student/applications/:
    get:
      operationId: student_applications_list
      description: |-
        GET /api/student/applications/
        List all of the logged-in student's applications with their statuses.
        Ordered by most recent first.
      tags:
      - Student - Applications
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApplicationList'
          description: ''
  /api/student/applications/{id}/:
    get:
      operationId: student_applications_retrieve
      description: |-
        GET /api/student/applications/<id>/
        View full details of one specific application.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Student - Applications
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationDetail'
          description: ''
  /api/student/applications/{id}/document/:
    get:
      operationId: student_applications_document_retrieve
      description: |-
        GET /api/student/applications/<id>/document/
        Download the internship agreement PDF.
        Only available when status = VALIDATED and a PDF has been generated.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Student - Applications
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: string
                format: binary
          description: ''
        '403':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
        '404':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/student/documents/:
    get:
      operationId: student_documents_list
      description: |-
        GET /api/student/documents/
        List all generated internship agreements (documents) for the logged-in student.
      tags:
      - Student - Applications
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StudentDocumentList'
          description: ''
  /api/student/me/skills/:
    get:
      operationId: student_me_skills_list
      description: |-
        GET /api/student/me/skills/
        Returns the skills the logged-in student has selected.
      tags:
      - Skills
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StudentSkill'
          description: ''
  /api/student/me/skills/{id}/remove/:
    delete:
      operationId: student_me_skills_remove_destroy
      description: |-
        DELETE /api/student/me/skills/<id>/remove/
        Student removes a skill chip by clicking X.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Skills
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/student/me/skills/add/:
    post:
      operationId: student_me_skills_add_create
      description: |-
        POST /api/student/me/skills/add/
        Student adds a skill chip to their profile.
        Request body: { "skill_id": 3 }
      tags:
      - Skills
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddStudentSkillRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AddStudentSkillRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AddStudentSkillRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentSkill'
          description: ''
  /api/student/offers/:
    get:
      operationId: student_offers_list
      description: |-
        GET /api/student/offers/
        Browse and search all open internship offers.

        Filters:
        - search      → matches title or description
        - wilaya      → exact wilaya string e.g. '19 - Sétif'
        - skills      → comma-separated skill IDs e.g. '1,3,5'
        - type        → 'paid' or 'unpaid'
        - duration    → 'short' (2-4 weeks), 'medium' (1-2 months), 'long' (2+ months)

        Ordering:
        - recent      → newest first (default)
        - salary_high → highest salary first (paid offers only)
        - start_soon  → earliest start date first
      parameters:
      - in: query
        name: duration
        schema:
          type: string
        description: short (14-28 days), medium (29-60 days), long (60+ days)
      - in: query
        name: ordering
        schema:
          type: string
        description: recent (default), salary_high, start_soon
      - in: query
        name: search
        schema:
          type: string
        description: Search in title and description
      - in: query
        name: skills
        schema:
          type: string
        description: Comma-separated skill IDs e.g. 1,3,5
      - in: query
        name: type
        schema:
          type: string
        description: paid or unpaid
      - in: query
        name: wilaya
        schema:
          type: string
        description: Filter by wilaya e.g. 19 - Sétif
      tags:
      - Student - Offers
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StudentOfferList'
          description: ''
  /api/student/offers/{id}/:
    get:
      operationId: student_offers_retrieve
      description: |-
        GET /api/student/offers/<id>/
        View full details of a specific offer.
        Also tells the frontend if this student already applied
        via the 'already_applied' field.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Student - Offers
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentOfferDetail'
          description: ''
  /api/student/offers/{id}/apply/:
    post:
      operationId: student_offers_apply_create
      description: |-
        POST /api/student/offers/<id>/apply/
        Student applies to an internship offer.

        Creates an Internship (application) record with status=PENDING.
        The offer's start_date, end_date, title are copied automatically.
        A student cannot apply twice to the same offer.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - Student - Applications
      security:
      - jwtAuth: []
      responses:
        '201':
