      type: object
      description: Serializer for the authenticated user detail (GET /me).
      properties:
        email:
          type: string
          format: email
          maxLength: 255
    ProfileImage:
      type: object
      description: Serializer for uploading student profile images.
      properties:
        id:
          type: integer
          readOnly: true
        profile_image:
          type: string
          format: uri
          nullable: true
      required:
      - id
      - profile_image
    RoleEnum:
      enum:
      - student
      - company
      - admin
      type: string
    Skill:
      type: object
      description: Simple skill — used in chips UI.
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
      required:
      - id
      - name
    StatusA6fEnum:
      enum:
      - open
      - closed
      type: string
    StatusEd1Enum:
      enum:
      - pending
      - accepted_by_company
      - validated
      - rejected
      type: string
    StudentDocumentList:
      type: object
      description: Lists the generated documents for a student.
